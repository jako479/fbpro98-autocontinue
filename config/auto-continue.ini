# Both settings below are required. They are re-read whenever this file
# changes, so edits apply while auto-continue is running.
[Settings]
# Seconds to move the mouse to the 'Continue' button.
# 0.0 moves the mouse instantly.
# Default is 0.0.
MouseMoveDuration = 0.0

# Seconds to wait before clicking the 'Continue' button.
#  0.0 clicks instantly.
# -1.0 disables clicking (lets the game continue on its own.)
# Default is 1.0.
DelayBeforeContinue = 1.0
